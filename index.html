<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Vortex Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div id="brandIcon" class="brand-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <h1 id="brandName">Vortex</h1>
                </div>
                <p class="subtitle">Enterprise Link Resolution Utility</p>
            </div>
            <button id="favoritesBtn" class="btn-icon heartbeat" title="View Favorites">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--danger)" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </button>
        </header>

        <main>
            <section class="search-card">
                <div class="input-group">
                    <div class="select-wrapper">
                        <div class="search-type-container">
                            <div class="search-switch" id="searchTypeSwitch">
                                <button type="button" class="switch-opt active" data-value="movie">Movies</button>
                                <button type="button" class="switch-opt" data-value="series">Series</button>
                            </div>
                        </div>
                    </div>
                    <input type="text" id="searchInput" placeholder="Enter title to search..." autocomplete="off">
                    <button id="searchBtn" class="btn-primary">SEARCH</button>
                </div>
            </section>

            <div id="loading" class="loading">
                <div class="spinner"></div>
            </div>

            <div id="resultsGrid" class="results-grid"></div>
        </main>
    </div>

    <!-- Modal System -->
    <div id="overlay" class="overlay">
        <div class="modal">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <button id="modalBackBtn" class="btn-icon" style="display: none; padding: 0.25rem;" title="Go Back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </button>
                    <div id="modalTitle" class="modal-title">Select Episode</div>
                </div>
                <button id="closeModal" class="close-modal">&times;</button>
            </div>
            <div id="modalLoading" class="loading">
                <div class="spinner"></div>
            </div>
            <div id="modalList" class="modal-body"></div>
            <div id="finalUrl" style="display:none"></div>
        </div>
    </div>

    <!-- Favorites Drawer -->
    <div id="drawerOverlay" class="drawer-overlay"></div>
    <div id="drawer" class="drawer">
        <div class="drawer-header">
            <h3 id="drawerTitle">My Favorites</h3>
            <button id="closeDrawer" class="close-modal">&times;</button>
        </div>
        <div id="favoritesList" class="drawer-body">
            <!-- Favorites items will be injected here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
